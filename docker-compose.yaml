services:
  db:
    image: postgres:16
    container_name: creditengine-db
    environment:
      POSTGRES_DB: creditengine
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - creditengine-net
   

  backend:
    build: ./backend
    container_name: creditengine-back
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/creditengine
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    depends_on:
      - db
    networks:
      - creditengine-net
    

  frontend:
    build: ./frontend
    container_name: creditengine-front
    ports:
      - "3000:80"   
    depends_on:
      - backend
    networks:
      - creditengine-net

networks:
  creditengine-net:
    driver: bridge

volumes:
  postgres_data: